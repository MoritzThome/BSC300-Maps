#!/bin/bash

# Map type configuration - add new types here, no need to touch easybuild.sh!

# Available map types (add new types to this list)

AVAILABLE_MAP_TYPES="streets-only streets-names water green"

# Descriptions (TYPE in uppercase with - replaced by _)

MAP_TYPE_DESC_STREETS_ONLY="Streets without names (smallest)"
MAP_TYPE_DESC_STREETS_NAMES="Streets with names"
MAP_TYPE_DESC_WATER="Streets + water features"
MAP_TYPE_DESC_GREEN="Streets + water + green areas (largest)"

# Tag files

TAG_FILE_STREETS_ONLY="tags_minimal_street_only.xml"
TAG_FILE_STREETS_NAMES="tags_minimal_street_only.xml"
TAG_FILE_WATER="tags_with_water.xml"
TAG_FILE_GREEN="tags_with_green_stuff.xml"

# Base keep filters (used by all types)

BASE_KEEP='--keep="highway=primary =primary_link =secondary =secondary_link =tertiary =tertiary_link =trunk =trunk_link =cycleway =living_street =residential =road =track =unclassified"
--keep="highway=service and ( bicycle=designated or bicycle=yes or bicycle=permissive )"
--keep="highway=footway and ( bicycle=designated or bicycle=yes or bicycle=permissive )"
--keep="highway=bridleway and ( bicycle=designated or bicycle=yes or bicycle=permissive )"
--keep="highway=path and ( bicycle=designated or bicycle=yes or bicycle=permissive )"
--keep="highway=pedestrian and ( bicycle=designated or bicycle=yes or bicycle=permissive )"
--keep="highway=unclassified and ( bicycle=designated or bicycle=yes or bicycle=permissive )"
--keep="sidewalk:*:bicycle=yes"
--keep="route=bicycle =mtb"
--keep="cycleway:*=lane :*=track *:=shared_lane *:=share_busway *:=separate *:=crossing *:=shoulder *:=link *:=traffic_island"
--keep="bicycle_road=yes"
--keep="cyclestreet=yes"'

# osmfilter arguments per type

FILTER_ARGS_STREETS_ONLY="$BASE_KEEP --drop-tags=\"name= ref=\""
FILTER_ARGS_STREETS_NAMES="$BASE_KEEP"
FILTER_ARGS_WATER="$BASE_KEEP --keep=\"waterway= landuse= natural=\""
FILTER_ARGS_GREEN="$BASE_KEEP --keep=\"waterway= landuse= natural= leisure=\""

# Base tag modifications (used by all types)

BASE_MODIFICATIONS='highway=trunk_link to =primary
highway=trunk to =primary
highway=primary_link to =primary
highway=tertiary_link to =tertiary
highway=secondary_link to =secondary
highway=footway to =cycleway
highway=bridleway to =cycleway
highway=sidewalk to =cycleway
highway=path to =cycleway
highway=pedestrian to =cycleway
highway=unclassified to =cycleway'

# Tag modifications per type

TAG_MODIFICATIONS_STREETS_ONLY="$BASE_MODIFICATIONS"
TAG_MODIFICATIONS_STREETS_NAMES="$BASE_MODIFICATIONS"
TAG_MODIFICATIONS_WATER="$BASE_MODIFICATIONS"
TAG_MODIFICATIONS_GREEN="$BASE_MODIFICATIONS
leisure=garden to landuse=grass
leisure=playground to landuse=grass
leisure=park to landuse=grass
landuse=orchard to =grass
landuse=allotments to =grass
landuse=farmland to =grass
landuse=flowerbed to =grass
landuse=meadow to =grass
landuse=plant_nursery to =grass
landuse=vineyard to =grass
landuse=greenfield to =grass
landuse=village_green to =grass
landuse=greenery to =grass
landuse=cemetery to =grass
natural=scrub to landuse=grass"

# Helper function to get config value for a type

# Usage: get_config "description" "water"

get_config() {
    local config_type="$1"  # description, tag_file, filter_args, or tag_modifications
    local map_type="$2"     # streets-only, water, etc.
    
    # Convert map-type to variable name format (streets-only -> STREETS_ONLY)
    local type_var=$(echo "$map_type" | tr '[:lower:]' '[:upper:]' | tr '-' '_')
    
    case "$config_type" in
        description)
            local var_name="MAP_TYPE_DESC_${type_var}"
            ;;
        tag_file)
            local var_name="TAG_FILE_${type_var}"
            ;;
        filter_args)
            local var_name="FILTER_ARGS_${type_var}"
            ;;
        tag_modifications)
            local var_name="TAG_MODIFICATIONS_${type_var}"
            ;;
        *)
            echo ""
            return 1
            ;;
    esac
    
    # Indirect variable reference
    echo "${!var_name}"
}

# Validate map type

is_valid_map_type() {
    local type="$1"
    for valid_type in $AVAILABLE_MAP_TYPES; do
        if [ "$type" = "$valid_type" ]; then
            return 0
        fi
    done
    return 1
}
