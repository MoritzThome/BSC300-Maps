#!/bin/bash

# Map type configuration

AVAILABLE_MAP_TYPES="streets-only water green streets-names" # easybuild uses this order

MAP_TYPE_DESC_STREETS_ONLY="Streets without names (smallest)"
MAP_TYPE_DESC_STREETS_NAMES="Streets with names"
MAP_TYPE_DESC_WATER="Streets + water features"
MAP_TYPE_DESC_GREEN="Streets + water + green areas (largest)"

TAG_FILE_STREETS_ONLY="conf/tags_minimal_street_only.xml"
TAG_FILE_STREETS_NAMES="conf/tags_minimal_street_only.xml"
TAG_FILE_WATER="conf/tags_with_water.xml"
TAG_FILE_GREEN="conf/tags_with_green_stuff.xml"

# Get description

get_description() {
    local type_var=$(echo "$1" | tr '[:lower:]-' '[:upper:]_')
    local var_name="MAP_TYPE_DESC_${type_var}"
    echo "${!var_name}"
}

# Get tag file

get_tag_file() {
    local type_var=$(echo "$1" | tr '[:lower:]-' '[:upper:]_')
    local var_name="TAG_FILE_${type_var}"
    echo "${!var_name}"
}

# Get filter command for osmfilter (returns complete command with args)
get_filter_cmd() {
    local type="$1"
    local verbose="$2"
    local osmfilter="$3"
    
    local v_flag=""
    [ "$verbose" = "true" ] && v_flag="-v"
    
    local base_keep='--keep="highway=primary =primary_link =secondary =secondary_link =tertiary =tertiary_link =trunk =trunk_link =cycleway =living_street =residential =road =track =unclassified" --keep="highway=service and ( bicycle=designated or bicycle=yes or bicycle=permissive )" --keep="highway=footway and ( bicycle=designated or bicycle=yes or bicycle=permissive )" --keep="highway=bridleway and ( bicycle=designated or bicycle=yes or bicycle=permissive )" --keep="highway=path and ( bicycle=designated or bicycle=yes or bicycle=permissive )" --keep="highway=pedestrian and ( bicycle=designated or bicycle=yes or bicycle=permissive )" --keep="highway=unclassified and ( bicycle=designated or bicycle=yes or bicycle=permissive )" --keep="sidewalk:*:bicycle=yes" --keep="route=bicycle =mtb" --keep="cycleway:*=lane :*=track *:=shared_lane *:=share_busway *:=separate *:=crossing *:=shoulder *:=link *:=traffic_island" --keep="bicycle_road=yes" --keep="cyclestreet=yes"'
    
    case "$type" in
        streets-only)
            echo "$osmfilter $v_flag tmp.o5m $base_keep --drop-tags=\"name= ref=\" --out-o5m"
            ;;
        streets-names)
            echo "$osmfilter $v_flag tmp.o5m $base_keep --out-o5m"
            ;;
        water)
            echo "$osmfilter $v_flag tmp.o5m $base_keep --keep=\"waterway= landuse= natural=\" --out-o5m"
            ;;
        green)
            echo "$osmfilter $v_flag tmp.o5m $base_keep --keep=\"waterway= landuse= natural= leisure=\" --out-o5m"
            ;;
    esac
}

# Get tag modification command

get_modify_cmd() {
    local type="$1"
    local verbose="$2"
    local osmfilter="$3"
    
    local v_flag=""
    [ "$verbose" = "true" ] && v_flag="-v"
    
    local base_mods='highway=trunk_link to =primary highway=trunk to =primary highway=primary_link to =primary highway=tertiary_link to =tertiary highway=secondary_link to =secondary highway=footway to =cycleway highway=bridleway to =cycleway highway=sidewalk to =cycleway highway=path to =cycleway highway=pedestrian to =cycleway highway=unclassified to =cycleway'
    
    if [ "$type" = "green" ]; then
        local extra_mods='leisure=garden to landuse=grass leisure=playground to landuse=grass leisure=park to landuse=grass landuse=orchard to =grass landuse=allotments to =grass landuse=farmland to =grass landuse=flowerbed to =grass landuse=meadow to =grass landuse=plant_nursery to =grass landuse=vineyard to =grass landuse=greenfield to =grass landuse=village_green to =grass landuse=greenery to =grass landuse=cemetery to =grass natural=scrub to landuse=grass'
        echo "$osmfilter $v_flag tmp1.o5m --modify-tags=\"$base_mods $extra_mods\" --drop-author --drop-version --out-o5m"
    else
        echo "$osmfilter $v_flag tmp1.o5m --modify-tags=\"$base_mods\" --drop-author --drop-version --out-o5m"
    fi
}

is_valid_map_type() {
    [[ " $AVAILABLE_MAP_TYPES " =~ " $1 " ]]
}
