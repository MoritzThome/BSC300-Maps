name: Build Maps + Container

on:
  push:
    branches: ["**"]
  schedule:
    - cron: '0 2 10 * 0'  # Monthly

  workflow_dispatch:


jobs:
  build-container:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    outputs:
      IMAGE: ${{ steps.set-image.outputs.IMAGE }}
      TAG: ${{ steps.set-image.outputs.TAG }}
      IMAGE_DIGEST: ${{ steps.push.outputs.IMAGE_DIGEST }}
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR

        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Container

        id: set-image
        run: |
          IMAGE=$(echo "ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          TAG=$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | tr '/' '-')

          docker build -t $IMAGE:$TAG .

          echo "IMAGE=$IMAGE" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Push Container
        id: push
        run: |
          docker push ${{ steps.set-image.outputs.IMAGE }}:${{ steps.set-image.outputs.TAG }}
          if [ "${{ steps.set-image.outputs.TAG }}" = "main" ] || [ "${{ steps.set-image.outputs.TAG }}" = "master" ]; then
            docker tag ${{ steps.set-image.outputs.IMAGE }}:${{ steps.set-image.outputs.TAG }} ${{ steps.set-image.outputs.IMAGE }}:latest
            docker push ${{ steps.set-image.outputs.IMAGE }}:latest
          fi
          docker images ${{ steps.set-image.outputs.IMAGE }}
          
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ steps.set-image.outputs.IMAGE }}:${{ steps.set-image.outputs.TAG }} | cut -d'@' -f2)
          echo "IMAGE_DIGEST=${{ steps.set-image.outputs.IMAGE }}@$DIGEST" >> $GITHUB_OUTPUT
          echo "DIGEST for next stage: ${{ steps.set-image.outputs.IMAGE }}@$DIGEST"
    
      - uses: actions/delete-package-versions@v5
        with: 
            package-name: 'bsc300-maps'
            package-type: 'container'
            min-versions-to-keep: 10
            delete-only-untagged-versions: 'true'


  generate-build-matrix:
    runs-on: ubuntu-slim
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Python

        run: |
          sudo apt update 
          sudo apt install -y python3 python3-yaml
      
      - name: Generate matrix
        id: generate
        run: |
            python3 << 'EOF'
            import yaml, json, os
            
            with open('countries.yml') as f:
                data = yaml.safe_load(f)
            
            matrix = []
            
            # Large countries first (longer build time)
            for country, config in sorted(data['countries'].items()):
                if 'memory' in config:
                    matrix.append({
                        'country': country,
                        'display': country
                    })
            
            # Normal countries
            for country, config in sorted(data['countries'].items()):
                if 'memory' not in config:
                    matrix.append({
                        'country': country,
                        'display': country
                    })
            
            with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                f.write(f"matrix={json.dumps({'include': matrix})}\n")
            
            print(f"Generated {len(matrix)} jobs")
            EOF

  build-maps:
    name: ${{ matrix.display }}
    runs-on: ubuntu-latest
    needs: [build-container, generate-build-matrix]
    strategy:
      fail-fast: false
      max-parallel: 15
      matrix: ${{ fromJson(needs.generate-build-matrix.outputs.matrix) }}
    
    steps:
      - name: clean runner storage
        run: |
            req=$((32*1024*1024)) # 32gb must be minimal free
            free(){ df --output=avail -k / | tail -1 | tr -d ' '; }

            echo "Free: $(( $(free)/1024/1024 )) GB"
            [[ $(free) -ge $req ]] && { echo "Enough space"; exit 0; }

            dirs="/usr/lib/jvm /usr/share/dotnet /usr/share/swift /usr/local/.ghcup /usr/local/julia* /usr/local/lib/android /opt/az /usr/local/share/powershell /opt/hostedtoolcache"

            for d in $dirs; do
                [[ "${{ inputs.verbose }}" == "true" ]] && echo "Removing $d"
                sudo rm -rf $d
                echo "Free: $(( $(free)/1024/1024 )) GB"
                [[ $(free) -ge $req ]] && { echo "Enough space"; exit 0; }
            done

            echo "Not enough space"
            exit 1
            

      - name: Set Swap Space for very large countries
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 20    

      - name: Build all map types for country in container

        run: |
            docker run -v /work/output/:/work/output/ ${{ needs.build-container.outputs.IMAGE_DIGEST }} -c ${{ matrix.country }}  -j 2 -v
          
      - name: Upload artifacts

        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: ${{ matrix.country }}
          path: /work/output/*/*.map
          if-no-files-found: warn

  release:
    name: Create Release
    runs-on: ubuntu-slim
    needs: build-maps
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts

        uses: actions/download-artifact@v6
        with:
          path: artifacts-raw

      - name: Merge by map type

        run: |        
          for country_dir in artifacts-raw/*; do
            for type_dir in "$country_dir"/*; do
              type=$(basename "$type_dir")
              mkdir -p "release-files/$type"
              mv "$type_dir"/*.map "release-files/$type/"
            done
          done
          
          # Generate release notes
          echo "## 🗺️ Map Files by Type" > release-notes.md
          echo "" >> release-notes.md
          echo "Each archive contains maps for all available countries/regions." >> release-notes.md
          echo "" >> release-notes.md
          
          total_maps=0
          for type_dir in release-files/*; do
            if [ -d "$type_dir" ]; then
              type=$(basename "$type_dir")
              count=$(find "$type_dir" -name "*.map" | wc -l)
              size=$(du -sh "$type_dir" | cut -f1)
              total_maps=$((total_maps + count))
              
              echo "- **${type}**: $count maps ($size)" >> release-notes.md
            fi
          done
          
          echo "" >> release-notes.md
          echo "**Total**: $total_maps map files" >> release-notes.md
          echo "" >> release-notes.md
          echo "### 📥 Installation" >> release-notes.md
          echo "" >> release-notes.md
          echo "1. Download desired \`*-maps.zip\` archive" >> release-notes.md
          echo "2. Extract ZIP archive" >> release-notes.md
          echo "3. Backup existing maps on your iGPSport device" >> release-notes.md
          echo "4. Copy \`.map\` files to device via USB" >> release-notes.md
          echo "5. Restart device to load new maps" >> release-notes.md
          
          cat release-notes.md

      - name: Create ZIP archives per map type

        run: |
          cd release-files
          for type_dir in */; do
            type=${type_dir%/}
            zip -9 -r "../${type}-maps.zip" "$type_dir"
          done
          ls -lh ../*.zip

      - name: Create Release

        uses: softprops/action-gh-release@v2
        with:
          tag_name: maps-${{ github.run_number }}-$(date +%Y%m%d)
          name: 🗺️ Maps $(date +%Y-%m-%d)
          body_path: release-notes.md
          files: "*-maps.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
