name: Build Maps + Container

on:
  push:
    branches: ["**"]
  schedule:
    - cron: '6 1 17 * 0'  # Monthly

  workflow_dispatch:


jobs:
  build-container:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    outputs:
      IMAGE: ${{ steps.set-image.outputs.IMAGE }}
      TAG: ${{ steps.set-image.outputs.TAG }}
      IMAGE_DIGEST: ${{ steps.push.outputs.IMAGE_DIGEST }}
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR

        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Container

        id: set-image
        run: |
          IMAGE=$(echo "ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          TAG=$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | tr '/' '-')

          docker build -t $IMAGE:$TAG .

          echo "IMAGE=$IMAGE" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Push Container
        id: push
        run: |
          docker push ${{ steps.set-image.outputs.IMAGE }}:${{ steps.set-image.outputs.TAG }}
          if [ "${{ steps.set-image.outputs.TAG }}" = "main" ] || [ "${{ steps.set-image.outputs.TAG }}" = "master" ]; then
            docker tag ${{ steps.set-image.outputs.IMAGE }}:${{ steps.set-image.outputs.TAG }} ${{ steps.set-image.outputs.IMAGE }}:latest
            docker push ${{ steps.set-image.outputs.IMAGE }}:latest
          fi
          docker images ${{ steps.set-image.outputs.IMAGE }}
          
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ steps.set-image.outputs.IMAGE }}:${{ steps.set-image.outputs.TAG }} | cut -d'@' -f2)
          echo "IMAGE_DIGEST=${{ steps.set-image.outputs.IMAGE }}@$DIGEST" >> $GITHUB_OUTPUT
          echo "DIGEST for next stage: ${{ steps.set-image.outputs.IMAGE }}@$DIGEST"
    
      - uses: actions/delete-package-versions@v5
        with: 
            package-name: 'bsc300-maps'
            package-type: 'container'
            min-versions-to-keep: 10
            delete-only-untagged-versions: 'true'


  generate-build-matrix:
    runs-on: ubuntu-slim
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Python dependencies

        run: |
          pip install pyyaml
      
      - name: Generate matrix
        id: generate
        run: |
            python3 << 'EOF'
            import yaml, json, os

            with open('conf/countries.yml') as f:
                data = yaml.safe_load(f)

            with open('conf/map-types.conf') as f:
                for line in f:
                    if line.strip().startswith('AVAILABLE_MAP_TYPES='):
                        MAP_TYPES = line.split('"')[1].split()
                        break

            large, normal = [], []

            for country, config in sorted(data['countries'].items()):
                is_large = 'memory' in config
                bucket = large if is_large else normal
                regions = config.get('regions', [])

                if config.get('single-job', False):
                    for region in regions:
                        bucket.append({
                            'country': f"{country}/{region['name']}",
                            'display': f"{country} - {region['name']}",
                            'map_type': '',
                            'artifact': f"{country}-{region['name']}"
                        })
                else:
                    bucket.append({
                        'country': country,
                        'display': country,
                        'map_type': '',
                        'artifact': country
                    })

            matrix = large + normal

            with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                f.write(f"matrix={json.dumps({'include': matrix})}\n")

            print(f"Generated {len(matrix)} jobs ({len(large)} large, {len(normal)} normal)")
            EOF

  build-maps:
    name: ${{ matrix.display }}
    runs-on: ubuntu-latest
    needs: [build-container, generate-build-matrix]
    strategy:
      fail-fast: false
      max-parallel: 15
      matrix: ${{ fromJson(needs.generate-build-matrix.outputs.matrix) }}
    
    steps:
      - name: clean runner storage
        run: |
            req=$((32*1024*1024)) # 32gb must be minimal free
            free(){ df --output=avail -k / | tail -1 | tr -d ' '; }

            echo "Free: $(( $(free)/1024/1024 )) GB"
            [[ $(free) -ge $req ]] && { echo "Enough space"; exit 0; }

            dirs="/usr/lib/jvm /usr/share/dotnet /usr/share/swift /usr/local/.ghcup /usr/local/julia* /usr/local/lib/android /opt/az /usr/local/share/powershell /opt/hostedtoolcache"

            for d in $dirs; do
                [[ "${{ inputs.verbose }}" == "true" ]] && echo "Removing $d"
                sudo rm -rf $d
                echo "Free: $(( $(free)/1024/1024 )) GB"
                [[ $(free) -ge $req ]] && { echo "Enough space"; exit 0; }
            done

            echo "Not enough space"
            exit 1
            

      - name: Set Swap Space for very large countries
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 20    

      - name: Build all map types for country in container

        run: |
            MAP_TYPE_ARG=""
            if [ -n "${{ matrix.map_type }}" ]; then
              MAP_TYPE_ARG="-t ${{ matrix.map_type }}"
            fi
            
            docker run -v /work/output/:/work/output/ ${{ needs.build-container.outputs.IMAGE_DIGEST }} -c ${{ matrix.country }} $MAP_TYPE_ARG -j 2 -v
          
      - name: Upload artifacts

        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: ${{ matrix.artifact }}
          path: /work/output/*/*.map
          if-no-files-found: error
          retention-days: 30

  combine:
    name: Combine all maps
    runs-on: ubuntu-latest
    needs: build-maps
    if: always()
    
    steps:
      - name: Download all artifacts

        uses: actions/download-artifact@v6
        with:
          path: artifacts-raw

      - name: Merge by map type
        id: date

        run: |        
          for country_dir in artifacts-raw/*; do
            for type_dir in "$country_dir"/*; do
              type=$(basename "$type_dir")
              mkdir -p "release-files/$type"
              mv "$type_dir"/*.map "release-files/$type/"
            done
          done         
          du -hd 1 release-files/
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Upload artifacts

        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.date.outputs.date }}-iGPSPORT-Maps
          path: release-files/
          if-no-files-found: error
          retention-days: 90
          compression-level: 9

      - name: Create per-type release zips (<2GB each)

        run: |
          set -euo pipefail
          MAX=$((2300*1024*1024))  # 2 GiB 
          mkdir -p release-zips

          for type_dir in release-files/*; do
            [ -d "$type_dir" ] || continue
            type="$(basename "$type_dir")"
            part=1
            used=0
            zip=""

            for f in "$type_dir"/*.map; do
              [ -e "$f" ] || continue
              size=$(stat -c%s "$f")

              # start new archive over 2GB
              if [ "$used" -gt 0 ] && [ $((used + size)) -gt "$MAX" ]; then
                part=$((part + 1))
                used=0
                zip=""
              fi

              if [ -z "$zip" ]; then
                zip="release-zips/${type}-part${part}.zip"
              fi

              zip -9 -j "$zip" "$f" >/dev/null
              used=$((used + size))
            done
            rm -rf $type_dir
          done
          ls -lhart release-zips/

      - name: Create GitHub Release

        if: github.event_name == 'schedule'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.date.outputs.date }}
          name: iGPSPORT Maps ${{ steps.date.outputs.date }}
          body: |
            # iGPSPORT Maps ${{ steps.date.outputs.date }}
            1. from [Github Releases](https://github.com/MoritzThome/BSC300-Maps/releases)
            2. Download desired map archives (githubs max file size is 2GB, therefore Map Types are split into multiple archives containing different countries)
            3. Extract ZIPs archive on your machine
            4. Copy existing maps from your iGPSport device to backup (yes, copy speed is only 450kb/s)
            5. Copy \`.map\` files to device via USB
            6. Restart device to load new maps
          files: |
            release-zips/*
