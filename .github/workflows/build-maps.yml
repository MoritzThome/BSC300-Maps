name: Build Maps + Container

on:
  push:
    branches: ["**"]
  schedule:
    - cron: '0 2 * * 0'  # Weekly on Sunday

  workflow_dispatch:


jobs:
  build-container:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    outputs:
      IMAGE: ${{ steps.set-image.outputs.IMAGE }}
      TAG: ${{ steps.set-image.outputs.TAG }}
      IMAGE_DIGEST: ${{ steps.push.outputs.IMAGE_DIGEST }}
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR

        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Container

        id: set-image
        run: |
          IMAGE=$(echo "ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          TAG=$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | tr '/' '-')

          docker build -t $IMAGE:$TAG .

          echo "IMAGE=$IMAGE" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Push Container
        id: push
        run: |
          docker push ${{ steps.set-image.outputs.IMAGE }}:${{ steps.set-image.outputs.TAG }}
          if [ "${{ steps.set-image.outputs.TAG }}" = "main" ] || [ "${{ steps.set-image.outputs.TAG }}" = "master" ]; then
            docker tag ${{ steps.set-image.outputs.IMAGE }}:${{ steps.set-image.outputs.TAG }} ${{ steps.set-image.outputs.IMAGE }}:latest
            docker push ${{ steps.set-image.outputs.IMAGE }}:latest
          fi
          docker images ${{ steps.set-image.outputs.IMAGE }}
          
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ steps.set-image.outputs.IMAGE }}:${{ steps.set-image.outputs.TAG }} | cut -d'@' -f2)
          echo "IMAGE_DIGEST=${{ steps.set-image.outputs.IMAGE }}@$DIGEST" >> $GITHUB_OUTPUT
          echo "DIGEST for next stage: ${{ steps.set-image.outputs.IMAGE }}@$DIGEST"
    
      - uses: actions/delete-package-versions@v5
        with: 
            package-name: 'bsc300-maps'
            package-type: 'container'
            min-versions-to-keep: 10
            delete-only-untagged-versions: 'true'


  generate-build-matrix:
    runs-on: ubuntu-slim
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Python

        run: |
          sudo apt update 
          sudo apt install -y python3 python3-yaml
      
      - name: Generate matrix
        id: generate
        run: |
            python3 << 'EOF'
            import yaml, json, os
            
            with open('countries.yml') as f:
                data = yaml.safe_load(f)
            
            with open('map-types.conf') as f:
                types = [line.split('=')[0].replace('MAP_TYPE_DESC_', '').replace('_', '-').lower() 
                        for line in f if line.startswith('MAP_TYPE_DESC_')]
            
            all_types = ','.join(types)
            matrix = []
            
            # First: large countries (with memory option)
            for country, config in sorted(data['countries'].items()):
                if 'memory' in config:
                    code = config['code']
                    state = config.get('state', '00')
                    for map_type in types:
                        matrix.append({
                            'country': country,
                            'display': f"{country} ({map_type})",
                            'code': code,
                            'state': state,
                            'types': map_type
                        })
            
            # Then: normal countries
            for country, config in sorted(data['countries'].items()):
                if 'memory' not in config:
                    code = config['code']
                    state = config.get('state', '00')
                    matrix.append({
                        'country': country,
                        'display': country,
                        'code': code,
                        'state': state,
                        'types': all_types
                    })
            
            with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                f.write(f"matrix={json.dumps({'include': matrix})}\n")
            
            print(f"Generated {len(matrix)} jobs")
            EOF

  build-maps:
    name: ${{ matrix.display }}
    runs-on: ubuntu-latest
    needs: [build-container, generate-build-matrix]
    strategy:
      fail-fast: false
      max-parallel: 15
      matrix: ${{ fromJson(needs.generate-build-matrix.outputs.matrix) }}
    
    steps:
      - name: Set Swap Space for very large countries
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 16

    

      - name: Build all map types for country

        run: |
            docker run -v /work/output/:/work/output/ ${{ needs.build-container.outputs.IMAGE_DIGEST }} -c ${{ matrix.country }} -t ${{ matrix.types }} -j 2 -v
          
      - name: Upload artifacts

        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: maps-${{ matrix.country }}-${{ matrix.region }}-${{ matrix.types || 'all' }}
          path: /work/output/*/*.map
          if-no-files-found: warn

  release:
    name: Create Release
    runs-on: ubuntu-slim
    needs: build-maps
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Download all artifacts

        uses: actions/download-artifact@v6
        with:
          pattern: maps-*
          path: artifacts-raw

      - name: Organize by map type

        run: |
          mkdir -p release-files
          
          echo "Organizing artifacts by map type..."
          
          # Structure: artifacts-raw/maps-COUNTRY/TYPE/*.map 
          # Target:     release-files/TYPE/*.map
          
          for country_dir in artifacts-raw/maps-*; do
            if [ -d "$country_dir" ]; then
              country=$(basename "$country_dir" | sed 's/^maps-//')
              echo "Processing: $country"
              
              for type_dir in "$country_dir"/*; do
                if [ -d "$type_dir" ]; then
                  type_name=$(basename "$type_dir")
                  mkdir -p "release-files/$type_name"
                  
                  # Copy all .map files
                  map_count=$(find "$type_dir" -name "*.map" | wc -l)
                  if [ $map_count -gt 0 ]; then
                    echo "  - $type_name: $map_count maps"
                    find "$type_dir" -name "*.map" -exec cp {} "release-files/$type_name/" \;
                  fi
                fi
              done
            fi
          done
          
          # Generate summary dynamically
          echo "## 🗺️ Map Files by Type" > summary.md
          echo "" >> summary.md
          echo "Download the archive for your preferred map type." >> summary.md
          echo "Each archive contains maps for all available countries/regions." >> summary.md
          echo "" >> summary.md
          echo "### Available Map Types" >> summary.md
          echo "" >> summary.md
          
          total_maps=0
          total_size=0
          
          # Read type descriptions from map-types.conf
          declare -A type_descriptions
          while IFS='=' read -r key value; do
            if [[ $key == MAP_TYPE_DESC_* ]]; then
              type_key=$(echo "$key" | sed 's/MAP_TYPE_DESC_//' | tr '[:upper:]_' '[:lower:]-')
              type_descriptions[$type_key]=$(echo "$value" | tr -d '"')
            fi
          done < map-types.conf
          
          for type_dir in release-files/*; do
            if [ -d "$type_dir" ]; then
              type_name=$(basename "$type_dir")
              count=$(find "$type_dir" -name "*.map" | wc -l)
              size=$(du -sh "$type_dir" | cut -f1)
              size_bytes=$(du -sb "$type_dir" | cut -f1)
              
              total_maps=$((total_maps + count))
              total_size=$((total_size + size_bytes))
              
              # Get description from map-types.conf or fallback
              desc="${type_descriptions[$type_name]:-Unknown map type}"
              
              echo "#### 📦 \`${type_name}-maps.tar.gz\`" >> summary.md
              echo "- **Description**: $desc" >> summary.md
              echo "- **Maps**: $count files" >> summary.md
              echo "- **Size**: $size" >> summary.md
              echo "" >> summary.md
            fi
          done
          
          echo "---" >> summary.md
          echo "" >> summary.md
          echo "**Total**: $total_maps map files" >> summary.md
          echo "" >> summary.md
          echo "### 📥 Installation" >> summary.md
          echo "" >> summary.md
          echo "1. Download desired \`*-maps.tar.gz\` archive" >> summary.md
          echo "2. Extract: \`tar -xzf MAPTYPE-maps.tar.gz\`" >> summary.md
          echo "3. Backup existing maps on your iGPSport device" >> summary.md
          echo "4. Copy \`.map\` files to device via USB" >> summary.md
          echo "5. Restart device to load new maps" >> summary.md
          
          cat summary.md
          
          # Create type-specific archives dynamically
          echo ""
          echo "Creating archives..."
          cd release-files
          for type_dir in */; do
            type_name=${type_dir%/}
            echo "  → ${type_name}-maps.tar.gz"
            tar -czf "../${type_name}-maps.tar.gz" "$type_dir"
          done
          cd ..
          
          echo ""
          echo "Release preparation complete!"
          ls -lh *-maps.tar.gz

      - name: Create Release

        uses: softprops/action-gh-release@v2
        with:
          tag_name: maps-${{ github.run_number }}-$(date +%Y%m%d-%H%M)
          name: 🗺️ Maps $(date +%Y-%m-%d)
          body_path: summary.md
          files: |
            *-maps.tar.gz
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
