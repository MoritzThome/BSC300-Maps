name: Build Maps + Container

on:
  push:
    branches: ["**"]
  schedule:
    - cron: '0 2 * * 0'  # Weekly on Sunday

  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-container:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    outputs:
      IMAGE: ${{ steps.set-image.outputs.IMAGE }}
      TAG: ${{ steps.set-image.outputs.TAG }}
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Container
        id: set-image
        run: |
          IMAGE=$(echo "ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          TAG=$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | tr '/' '-')

          docker build -t $IMAGE:$TAG .

          echo "IMAGE=$IMAGE" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Push Container
        run: |
          docker push ${{ steps.set-image.outputs.IMAGE }}:${{ steps.set-image.outputs.TAG }}
          if [ "${{ steps.set-image.outputs.TAG }}" = "main" ] || [ "${{ steps.set-image.outputs.TAG }}" = "master" ]; then
            docker tag ${{ steps.set-image.outputs.IMAGE }}:${{ steps.set-image.outputs.TAG }} ${{ steps.set-image.outputs.IMAGE }}:latest
            docker push ${{ steps.set-image.outputs.IMAGE }}:latest
          fi
          docker images ${{ steps.set-image.outputs.IMAGE }}


  generate-build-matrix:
    runs-on: ubuntu-slim
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Python and dependencies

        run: |
          sudo apt update 
          sudo apt install python3 python3-yaml python3-pip
      
      - name: Generate matrix

        id: generate
        run: |
          python3 << 'EOF'
          import yaml, json, os
          with open('countries.yml') as f: 
              countries = list(yaml.safe_load(f)['countries'].keys())
          with open('map-types.conf') as f:
              types = [line.split('=')[0].replace('MAP_TYPE_DESC_', '').replace('_', '-').lower() 
                      for line in f if line.startswith('MAP_TYPE_DESC_')]
          matrix = [{'country': c, 'type': t} for c in sorted(countries) for t in types]
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"matrix={json.dumps({'include': matrix})}\n")
          print(f"Generated {len(matrix)} jobs: {len(countries)} countries × {len(types)} types")
          EOF

  build-maps:
    name: ${{ matrix.country }} - ${{ matrix.type }}
    runs-on: ubuntu-latest
    needs: [build-container, generate-build-matrix]
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix: ${{ fromJson(needs.generate-build-matrix.outputs.matrix) }}
    
    container:
      image: ${{ needs.build-container.outputs.IMAGE }}:${{ needs.build-container.outputs.TAG }}
    
    steps:
      - name: Build maps

        run: /work/easybuild.sh -c ${{ matrix.country }} -t ${{ matrix.type }} -j 2

      - name: Upload artifact

        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: ${{ matrix.type }}-${{ matrix.country }}
          path: /work/output/${{ matrix.type }}/*.map
          if-no-files-found: warn

  release:
    name: Create Release
    runs-on: ubuntu-slim
    needs: build-maps
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Download all artifacts

        uses: actions/download-artifact@v6
        with:
          pattern: maps-*
          path: artifacts

      - name: Create Release

        uses: softprops/action-gh-release@v1
        with:
          tag_name: maps-$(date +%Y%m%d)
          name: Maps $(date +%Y-%m-%d)
          body: |
            Automated weekly map build from OpenStreetMap data.
            
            **Installation:**
            1. Backup Map files from iGPSSport Device over USB (yes, USB Speed is only 500KB/s)
            2. Remove old maps on device
            3. Download desired type and countries
            4. Extract .map files
            5. Copy to BCS300 device

          files: artifacts/*/*.map
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
